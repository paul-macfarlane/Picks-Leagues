# Staleness gate: fails if the committed API client is out of sync with the spec.
# FND-016 (full CI pipeline) may absorb this job into its matrix or keep it standalone.
name: API client staleness check

on:
  pull_request:

jobs:
  api-client-check:
    name: Verify generated API client is up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: "10.33.4"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check API client is not stale
        run: |
          pnpm gen:api
          git diff --exit-code -- apps/web/src/lib/api-client || {
            echo "Generated API client is stale. Run 'pnpm gen:api' and commit the result."
            exit 1
          }
