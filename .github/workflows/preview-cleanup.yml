name: Preview environment — cleanup

# Tears down the per-PR Neon branch and branch-scoped Vercel DATABASE_URL
# when a PR is merged or closed.
#
# Required GitHub secrets (same set as preview-env.yml):
#   NEON_API_KEY, NEON_PROJECT_ID, VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
#
# Until these secrets exist the workflow fails on the guard step with a clear
# error rather than mis-provisioning anything.

on:
  pull_request:
    types: [closed]

jobs:
  cleanup:
    name: Delete preview DB branch + Vercel env var
    runs-on: ubuntu-latest
    steps:
      - name: Guard — verify required secrets are present
        shell: bash
        run: |
          missing=()
          [[ -z "$NEON_API_KEY"      ]] && missing+=("NEON_API_KEY")
          [[ -z "$NEON_PROJECT_ID"   ]] && missing+=("NEON_PROJECT_ID")
          [[ -z "$VERCEL_TOKEN"      ]] && missing+=("VERCEL_TOKEN")
          [[ -z "$VERCEL_ORG_ID"     ]] && missing+=("VERCEL_ORG_ID")
          [[ -z "$VERCEL_PROJECT_ID" ]] && missing+=("VERCEL_PROJECT_ID")
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::error::Secrets not yet provisioned: ${missing[*]}"
            echo "Follow the runbook in docs/deploy.md (§ Per-PR preview environments) to add them."
            exit 1
          fi
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Delete Neon branch
        shell: bash
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
          # Neon branch keyed on PR number (matches how preview-env.yml created it).
          # The Vercel env var below uses head_ref instead — different namespaces; both are intentional.
          BRANCH_NAME: preview/pr-${{ github.event.number }}
        run: |
          # Resolve branch name to ID (idempotent — no-op if already deleted).
          branch_id=$(curl -sf \
            -H "Authorization: Bearer $NEON_API_KEY" \
            "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/branches" \
            | python3 -c "
          import sys, json, os
          data = json.load(sys.stdin)
          match = [b['id'] for b in data.get('branches', []) if b.get('name') == os.environ['BRANCH_NAME']]
          print(match[0] if match else '')
          " 2>/dev/null || true)

          if [[ -z "$branch_id" ]]; then
            echo "Neon branch '$BRANCH_NAME' not found (already deleted or never created). Skipping."
          else
            status=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
              -H "Authorization: Bearer $NEON_API_KEY" \
              "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/branches/$branch_id")
            if [[ "$status" == "200" || "$status" == "204" || "$status" == "404" ]]; then
              echo "Deleted Neon branch '$BRANCH_NAME' (id=$branch_id, HTTP $status)."
            else
              echo "::error::Unexpected HTTP $status when deleting Neon branch '$BRANCH_NAME'."
              exit 1
            fi
          fi

      - name: Delete branch-scoped DATABASE_URL in Vercel
        shell: bash
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          # Vercel env var keyed on head_ref (the git branch name) — matches how preview-env.yml set it.
          # The Neon branch above uses event.number instead; different namespaces; both are intentional.
          PR_HEAD_REF: ${{ github.head_ref }}
        run: |
          existing_id=$(curl -sf \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "X-Vercel-Team-Id: $VERCEL_ORG_ID" \
            "https://api.vercel.com/v10/projects/$VERCEL_PROJECT_ID/env?gitBranch=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))" "$PR_HEAD_REF")&target=preview" \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          envs = data.get('envs', [])
          match = [e['id'] for e in envs if e.get('key') == 'DATABASE_URL']
          print(match[0] if match else '')
          " 2>/dev/null || true)

          if [[ -z "$existing_id" ]]; then
            echo "No branch-scoped DATABASE_URL found for branch '$PR_HEAD_REF'. Already cleaned up or never set."
          else
            curl -sf -X DELETE \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              -H "X-Vercel-Team-Id: $VERCEL_ORG_ID" \
              "https://api.vercel.com/v10/projects/$VERCEL_PROJECT_ID/env/$existing_id" \
              > /dev/null
            echo "Deleted DATABASE_URL env var (id=$existing_id) for branch '$PR_HEAD_REF'."
          fi
